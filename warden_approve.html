<!DOCTYPE html>
<html>
<head>
    <title>Approve Hostel Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<div class="container">
<h2>Approve Hostel Application</h2>

<p>Student Name: {{ app.name }}</p>
<p>Roll No: {{ app.rollno }}</p>
<p>Hostel Name: {{ app.hostel_name }}</p>
<p>Room Type: {{ app.room_type }}</p>

<form method="POST">
    <label>Block:</label><br>
    <input type="text" name="block" required><br><br>

    <label>Floor No:</label><br>
    <input type="number" name="floor_no" required><br><br>

    <label>Room No:</label><br>
    <input type="text" name="room_no" required><br><br>

    <label>Bed No:</label><br>
    <input type="text" name="bed_no" required><br><br>

    <button type="submit">Approve Hostel</button>
</form>

<p><a href="/warden/dashboard">Back to Dashboard</a></p>
</div>
</body>
</html>
